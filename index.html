<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maeso</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;1,200;1,300&family=Outfit:wght@200;300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --black: #080808; --surface: #111111; --surface2: #161616;
    --border: rgba(255,255,255,0.06); --border-h: rgba(255,255,255,0.12);
    --gold: #C9A46E; --gold-l: #E2C49A;
    --white: #F5F0EA; --muted: rgba(245,240,234,0.38);
    --fd: 'Cormorant Garamond', serif; --fb: 'Outfit', sans-serif;
  }
  html, body { height: 100%; }
  body {
    background: var(--black); color: var(--white);
    font-family: var(--fb); font-weight: 300;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* BURNED WOOD BG */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background-image: url('IMG_1340.JPG');
    background-size: cover; background-position: center;
    filter: brightness(0.08) saturate(0.4);
  }
  .bg-overlay {
    position: fixed; inset: 0; z-index: 1;
    background: radial-gradient(ellipse at center, rgba(8,8,8,0.4) 0%, rgba(8,8,8,0.92) 70%);
  }

  /* MAIN */
  .main {
    position: relative; z-index: 2;
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 0 24px;
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .main.pushed { transform: translateY(-18vh); }

  .wordmark {
    font-family: var(--fb);
    font-size: clamp(5rem, 18vw, 14rem);
    font-weight: 200;
    letter-spacing: 0.15em;
    line-height: 1;
    color: var(--white);
    text-align: center;
    margin-bottom: 18px;
    user-select: none;
    text-transform: uppercase;
  }

  .tagline {
    font-size: clamp(0.68rem, 1.4vw, 0.85rem);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  /* TABS */
  .tabs {
    position: relative; z-index: 2;
    display: flex; justify-content: center;
    gap: 2px;
    padding: 0 24px 40px;
    flex-wrap: wrap;
  }

  .tab {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    padding: 20px 24px;
    border: 1px solid var(--border);
    background: rgba(8,8,8,0.6);
    backdrop-filter: blur(12px);
    cursor: pointer;
    transition: all 0.25s;
    min-width: 100px;
    user-select: none;
  }
  .tab:hover { border-color: var(--border-h); background: rgba(20,20,20,0.8); }
  .tab.on { border-color: var(--gold); background: rgba(20,20,20,0.95); }
  .tab svg { width: 28px; height: 28px; opacity: 0.5; transition: opacity 0.25s; }
  .tab:hover svg, .tab.on svg { opacity: 1; }
  .tab-name {
    font-size: 0.72rem; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--muted);
    transition: color 0.25s; white-space: nowrap;
  }
  .tab:hover .tab-name, .tab.on .tab-name { color: var(--white); }
  .tab.on .tab-name { color: var(--gold); }

  /* FORM PANEL */
  .panel {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    background: rgba(10,10,10,0.97);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 32px 24px 40px;
    transform: translateY(100%);
    transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
    max-height: 75vh;
    overflow-y: auto;
  }
  .panel.open { transform: translateY(0); }

  .panel-inner { max-width: 520px; margin: 0 auto; }

  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  .panel-title {
    font-family: var(--fd); font-size: 1.6rem; font-weight: 300;
  }
  .panel-title span { color: var(--gold); font-style: italic; }
  .panel-close {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 1.2rem; padding: 4px;
    transition: color 0.3s;
  }
  .panel-close:hover { color: var(--white); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .form-group { margin-bottom: 12px; }
  .form-label { font-size: 0.58rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); display: block; margin-bottom: 8px; }
  .form-input, .form-textarea, .form-select {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--white); padding: 12px 14px;
    font-family: var(--fb); font-size: 0.82rem; font-weight: 300;
    outline: none; transition: border-color 0.3s; appearance: none;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--gold); }
  .form-input::placeholder, .form-textarea::placeholder { color: var(--muted); }
  .form-textarea { resize: none; height: 80px; }
  .form-select { cursor: pointer; }
  .form-select option { background: #111; }

  .btn-submit {
    width: 100%; background: var(--white); color: var(--black);
    border: none; padding: 16px;
    font-family: var(--fb); font-size: 0.68rem;
    letter-spacing: 0.22em; text-transform: uppercase;
    cursor: pointer; transition: all 0.3s; margin-top: 4px;
  }
  .btn-submit:hover { background: var(--gold); }

  .form-note { font-size: 0.6rem; color: var(--muted); text-align: center; margin-top: 12px; line-height: 1.6; }

  /* SUCCESS */
  .success { display: none; text-align: center; padding: 32px 0; }
  .success.show { display: block; }
  .success-mark { font-family: var(--fd); font-size: 3rem; color: var(--gold); margin-bottom: 12px; }
  .success-title { font-family: var(--fd); font-size: 1.6rem; font-weight: 300; margin-bottom: 8px; }
  .success-sub { font-size: 0.78rem; color: var(--muted); line-height: 1.8; }

  /* MAESO MARK */
  .maeso-mark {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    z-index: 5; font-family: var(--fb); font-size: 0.75rem; font-weight: 200;
    letter-spacing: 0.4em; text-transform: uppercase; color: var(--muted);
    opacity: 0; transition: opacity 0.4s;
  }
  .maeso-mark.show { opacity: 1; }

  @media(max-width: 600px) {
    .tab { padding: 14px 12px; min-width: 60px; }
    .tab svg { width: 20px; height: 20px; }
    .tab-name { font-size: 0.52rem; }
    .form-row { grid-template-columns: 1fr; }
    .panel { padding: 24px 20px 32px; }
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-overlay"></div>

<!-- Small mark when panel open -->
<div class="maeso-mark" id="maeso-mark">Maeso</div>

<!-- CENTER -->
<div class="main" id="main">
  <div class="wordmark">Maeso</div>
  <div class="tagline">Where builders lead</div>
</div>

<!-- TABS -->
<div class="tabs" id="tabs">

  <div class="tab" id="tab-kitchen" onclick="openPanel('Kitchen', this)">
    <svg viewBox="0 0 24 24" fill="none">
      <rect x="2" y="13" width="20" height="8" stroke="#F5F0EA" stroke-width="0.8"/>
      <rect x="2" y="4" width="20" height="8" stroke="#F5F0EA" stroke-width="0.8"/>
      <line x1="2" y1="9.5" x2="22" y2="9.5" stroke="#F5F0EA" stroke-width="0.4"/>
      <circle cx="7" cy="16.5" r="1.5" stroke="#C9A46E" stroke-width="0.7"/>
      <circle cx="12" cy="16.5" r="1.5" stroke="#C9A46E" stroke-width="0.7"/>
      <rect x="16" y="15" width="4" height="2.5" stroke="#C9A46E" stroke-width="0.7"/>
    </svg>
    <span class="tab-name">Kitchen</span>
  </div>

  <div class="tab" id="tab-bathroom" onclick="openPanel('Bathroom', this)">
    <svg viewBox="0 0 24 24" fill="none">
      <rect x="3" y="10" width="18" height="9" rx="1" stroke="#F5F0EA" stroke-width="0.8"/>
      <path d="M6 10 V6 Q6 3 9 3 H10" stroke="#F5F0EA" stroke-width="0.8"/>
      <circle cx="10" cy="3" r="1" stroke="#C9A46E" stroke-width="0.7"/>
      <line x1="12" y1="14" x2="12" y2="17" stroke="#C9A46E" stroke-width="0.7"/>
      <line x1="10" y1="15.5" x2="14" y2="15.5" stroke="#C9A46E" stroke-width="0.7"/>
    </svg>
    <span class="tab-name">Bathroom</span>
  </div>

  <div class="tab" id="tab-stairs" onclick="openPanel('Stairs', this)">
    <svg viewBox="0 0 24 24" fill="none">
      <polyline points="2,21 2,16 7,16 7,11 12,11 12,6 17,6 17,3 22,3 22,21" stroke="#F5F0EA" stroke-width="0.8"/>
      <line x1="2" y1="21" x2="22" y2="21" stroke="#C9A46E" stroke-width="0.8"/>
    </svg>
    <span class="tab-name">Stairs</span>
  </div>

  <div class="tab" id="tab-painting" onclick="openPanel('Painting', this)">
    <svg viewBox="0 0 24 24" fill="none">
      <rect x="2" y="2" width="16" height="14" stroke="#F5F0EA" stroke-width="0.8"/>
      <line x1="18" y1="5" x2="22" y2="5" stroke="#C9A46E" stroke-width="1.2"/>
      <line x1="18" y1="9" x2="22" y2="9" stroke="#C9A46E" stroke-width="1.2"/>
      <line x1="10" y1="16" x2="10" y2="22" stroke="#F5F0EA" stroke-width="0.8"/>
      <line x1="7" y1="22" x2="13" y2="22" stroke="#F5F0EA" stroke-width="0.8"/>
    </svg>
    <span class="tab-name">Painting</span>
  </div>

  <div class="tab" id="tab-interior" onclick="openPanel('Interior Design', this)">
    <svg viewBox="0 0 24 24" fill="none">
      <rect x="2" y="13" width="20" height="5" rx="0.5" stroke="#F5F0EA" stroke-width="0.8"/>
      <rect x="4" y="10" width="6" height="3" stroke="#F5F0EA" stroke-width="0.7"/>
      <rect x="14" y="10" width="6" height="3" stroke="#F5F0EA" stroke-width="0.7"/>
      <line x1="4" y1="18" x2="4" y2="21" stroke="#F5F0EA" stroke-width="0.8"/>
      <line x1="20" y1="18" x2="20" y2="21" stroke="#F5F0EA" stroke-width="0.8"/>
      <rect x="10" y="6" width="4" height="7" stroke="#C9A46E" stroke-width="0.7"/>
    </svg>
    <span class="tab-name">Interior</span>
  </div>

  <div class="tab" id="tab-custom" onclick="openPanel('Custom Project', this)">
    <svg viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="9" stroke="#F5F0EA" stroke-width="0.8"/>
      <line x1="12" y1="3" x2="12" y2="21" stroke="#C9A46E" stroke-width="0.4"/>
      <line x1="3" y1="12" x2="21" y2="12" stroke="#C9A46E" stroke-width="0.4"/>
      <circle cx="12" cy="12" r="2.5" stroke="#C9A46E" stroke-width="0.8"/>
    </svg>
    <span class="tab-name">Custom</span>
  </div>

</div>

<!-- PANEL -->
<div class="panel" id="panel">
  <div class="panel-inner">
    <div class="panel-header">
      <div class="panel-title">Start your <span id="panel-cat">project</span></div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>

    <form id="brief-form" action="https://formspree.io/f/mykoqjjp" method="POST">
      <input type="hidden" name="contractor" value="407 Renovations · Maeso">
      <input type="hidden" name="project_type" id="proj-type">

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Name</label>
          <input class="form-input" type="text" name="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="form-input" type="tel" name="phone" placeholder="(407) 000-0000">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" name="email" placeholder="your@email.com" required>
      </div>

      <div class="form-group">
        <label class="form-label">Tell me what you want</label>
        <textarea class="form-textarea" name="description" placeholder="Describe your space and what you're dreaming about..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Budget</label>
          <select class="form-select" name="budget">
            <option value="">Select range</option>
            <option>Under $5,000</option>
            <option>$5,000 – $15,000</option>
            <option>$15,000 – $30,000</option>
            <option>$30,000 – $60,000</option>
            <option>$60,000+</option>
            <option>Not sure</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Timeline</label>
          <select class="form-select" name="timeline">
            <option value="">When to start?</option>
            <option>As soon as possible</option>
            <option>1–3 months</option>
            <option>3–6 months</option>
            <option>Just exploring</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">Send My Brief →</button>
      <p class="form-note">You'll hear back within 24 hours. No pressure — just a real conversation.</p>
    </form>

    <div class="success" id="success">
      <div class="success-mark">✦</div>
      <div class="success-title">Brief received.</div>
      <p class="success-sub">Javier will review your project and reach out within 24 hours with his vision and next steps.</p>
    </div>

  </div>
</div>

<script>
  let activeTab = null;

  function openPanel(cat, el) {
    // Tab state
    if (activeTab) activeTab.classList.remove('on');
    el.classList.add('on');
    activeTab = el;

    // Set category
    document.getElementById('proj-type').value = cat;
    document.getElementById('panel-cat').textContent = cat.toLowerCase();

    // Open panel
    document.getElementById('panel').classList.add('open');
    document.getElementById('main').classList.add('pushed');
    document.getElementById('maeso-mark').classList.add('show');
  }

  function closePanel() {
    document.getElementById('panel').classList.remove('open');
    document.getElementById('main').classList.remove('pushed');
    document.getElementById('maeso-mark').classList.remove('show');
    if (activeTab) { activeTab.classList.remove('on'); activeTab = null; }
  }

  // Form submit
  document.getElementById('brief-form').addEventListener('submit', function(e) {
    const btn = document.getElementById('submit-btn');
    btn.textContent = 'Sending...';
    btn.style.opacity = '0.6';
    btn.disabled = true;
    setTimeout(() => {
      document.getElementById('brief-form').style.display = 'none';
      document.getElementById('success').classList.add('show');
    }, 1200);
    // Let Formspree handle actual submission in background
  });

  // Close panel on backdrop tap
  document.getElementById('main').addEventListener('click', function(e) {
    if (document.getElementById('panel').classList.contains('open')) closePanel();
  });
</script>

</body>
</html>
